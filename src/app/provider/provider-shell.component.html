<div class="provider-focus-layout">
  <aside class="focus-sidebar" aria-label="Navegación proveedor">
    <div class="focus-sidebar-top">
    <a
      routerLink="/proveedor"
      class="focus-brand"
      [routerLinkActiveOptions]="{ exact: true }"
      routerLinkActive="active"
    >
      <span class="focus-brand-name">GOrbitSF</span>
      <span class="focus-brand-focus">FOCUS</span>
    </a>

    <div class="focus-sidebar-scroll">
      <nav class="focus-nav-section" aria-label="Principal">
        <a
          routerLink="/proveedor"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="focus-nav-link focus-nav-link--home"
        >
          <span class="focus-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9.5Z" />
            </svg>
          </span>
          <span class="nav-label nav-label--single">Inicio</span>
        </a>
      </nav>

      <nav class="focus-nav-section" aria-label="Trabajo">
        <h3>Trabajo</h3>
        <a routerLink="/proveedor/modo/campo" routerLinkActive="active" class="focus-nav-link">
          <span class="focus-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" />
              <rect x="9" y="3" width="6" height="4" rx="1" />
              <path d="M9 12h6M9 16h4" />
            </svg>
          </span>
          <span class="nav-label">
            <span class="nav-title">Campo</span>
            <span class="nav-sub">Vender / guías</span>
          </span>
        </a>
        <a routerLink="/proveedor/modo/cobranza" routerLinkActive="active" class="focus-nav-link">
          <span class="focus-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 7v10M9.5 9.5c0-1.1 1.12-2 2.5-2s2.5.9 2.5 2-1.12 2-2.5 2-2.5.9-2.5 2 1.12 2 2.5 2" />
            </svg>
          </span>
          <span class="nav-label">
            <span class="nav-title">Cobranza</span>
            <span class="nav-sub">Cobrar pendientes</span>
          </span>
        </a>
        <a routerLink="/proveedor/modo/carga" routerLinkActive="active" class="focus-nav-link">
          <span class="focus-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
              <path d="M3.27 6.96 12 12.01l8.73-5.05M12 22.08V12" />
            </svg>
          </span>
          <span class="nav-label">
            <span class="nav-title">Carga</span>
            <span class="nav-sub">Stock / retiros</span>
          </span>
        </a>
        <a routerLink="/proveedor/modo/caja" routerLinkActive="active" class="focus-nav-link">
          <span class="focus-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2" />
              <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2M12 12v4" />
            </svg>
          </span>
          <span class="nav-label">
            <span class="nav-title">Caja</span>
            <span class="nav-sub">Cerrar / conciliación</span>
          </span>
        </a>
      </nav>

      <nav class="focus-nav-section focus-nav-section--grouped" aria-label="Gestión">
        <h3>Gestión</h3>
        <a routerLink="/proveedor/informe-cierre" routerLinkActive="active" class="focus-nav-link">
          <span class="focus-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3v18h18" />
              <path d="M7 16l3-3 3 3 4-5" />
            </svg>
          </span>
          <span class="nav-label nav-label--single">Reportes</span>
        </a>
        <a routerLink="/proveedor/calendario-cuotas" routerLinkActive="active" class="focus-nav-link">
          <span class="focus-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M16 2v4M8 2v4M3 10h18" />
            </svg>
          </span>
          <span class="nav-label nav-label--single">Agenda</span>
        </a>
        <a routerLink="/proveedor/cobranza" routerLinkActive="active" class="focus-nav-link">
          <span class="focus-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
            </svg>
          </span>
          <span class="nav-label nav-label--single">Mensajes</span>
        </a>
        <a routerLink="/proveedor/catalogo" routerLinkActive="active" class="focus-nav-link">
          <span class="focus-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
          </span>
          <span class="nav-label nav-label--single">Catálogo</span>
        </a>
      </nav>

      <nav class="focus-nav-section focus-nav-section--grouped" aria-label="Sistema">
        <h3>Sistema</h3>
        <a routerLink="/proveedor/perfil" routerLinkActive="active" class="focus-nav-link">
          <span class="focus-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3" />
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
            </svg>
          </span>
          <span class="nav-label nav-label--single">Ajustes</span>
        </a>
      </nav>
    </div>
    </div>

    <footer class="focus-sidebar-bottom">
      <div class="focus-user-panel">
        <a routerLink="/proveedor/perfil" class="focus-user-panel-link">
          <span class="focus-user-panel-main">
            <app-provider-avatar />
            <span class="focus-user-panel-text">
              <span class="focus-user-panel-name">{{ displayName() }}</span>
              <span class="focus-user-panel-role">Embajador</span>
            </span>
          </span>
          @if (zoneName(); as zone) {
            <span class="focus-user-panel-zone">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M12 21s7-4.5 7-11a7 7 0 1 0-14 0c0 6.5 7 11 7 11z" />
                <circle cx="12" cy="10" r="2.5" />
              </svg>
              {{ zone }}
            </span>
          }
        </a>
        <button type="button" class="focus-icon-btn" (click)="logout()" aria-label="Cerrar sesión">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </footer>
  </aside>

  <main class="focus-main">
    <router-outlet />
  </main>

  <nav class="focus-bottom-nav" aria-label="Navegación móvil">
    <a routerLink="/proveedor" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <span class="bn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9.5Z" />
        </svg>
      </span>
      Inicio
    </a>
    <a routerLink="/proveedor/modo/campo" routerLinkActive="active">
      <span class="bn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" />
          <rect x="9" y="3" width="6" height="4" rx="1" />
        </svg>
      </span>
      Campo
    </a>
    <a routerLink="/proveedor/modo/cobranza" routerLinkActive="active">
      <span class="bn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 7v10" />
        </svg>
      </span>
      Cobrar
    </a>
    <a routerLink="/proveedor/modo/carga" routerLinkActive="active">
      <span class="bn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
        </svg>
      </span>
      Carga
    </a>
    <a routerLink="/proveedor/modo/caja" routerLinkActive="active">
      <span class="bn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75">
          <rect x="2" y="7" width="20" height="14" rx="2" />
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
        </svg>
      </span>
      Caja
    </a>
    <button type="button" class="focus-bottom-nav-logout" (click)="logout()" aria-label="Cerrar sesión">
      <span class="bn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </span>
      Salir
    </button>
  </nav>
</div>
