<div class="admin-layout">
  <aside class="admin-sidebar" aria-label="Menú administración">
    <div class="admin-sidebar-head">
      <a routerLink="/admin/dashboard" class="admin-sidebar-brand">GOrbitS</a>
      <span class="admin-sidebar-badge">Administración</span>
    </div>

    <div class="admin-sidebar-body">
      @for (group of navGroups; track group.title ?? group.items[0].link) {
        @if (group.title) {
          <p class="admin-sidebar-group">{{ group.title }}</p>
        }
        <nav class="admin-sidebar-nav" [attr.aria-label]="group.title ?? 'Principal'">
          @for (item of group.items; track item.link) {
            <a
              [routerLink]="item.link"
              routerLinkActive="active"
              [routerLinkActiveOptions]="linkMatch(item)"
              >{{ item.label }}</a
            >
          }
        </nav>
      }
    </div>

    <footer class="admin-sidebar-foot">
      <button type="button" class="admin-sidebar-logout" (click)="logout()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Cerrar sesión
      </button>
    </footer>
  </aside>

  <main class="admin-main">
    <router-outlet />
  </main>
</div>
